<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1" name="viewport"/>
<title>Donate — Semitic Jew</title>
<link href="/israelite-research/styles.css" rel="stylesheet"/>

<style>
  .donate-page .container{max-width:1200px;margin:0 auto;padding:0 16px;}
  .donate-page main{padding:24px 0 48px;}

  .hero{display:grid;gap:16px;margin:14px 0 24px;}
  .hero h1{font-size:2rem;margin:0;font-weight:900;color:var(--ink)}
  .hero p{margin:0;color:var(--muted);max-width:70ch}

  .impact-badges{display:flex;flex-wrap:wrap;gap:10px}
  .impact-badges .badge{
    padding:8px 10px;
    border:1px solid var(--border);
    border-radius:999px;
    background:var(--surface);
    color:var(--ink);
    font-weight:600;
    font-size:.9rem;
  }

  .grid{display:grid;gap:16px}
  @media(min-width:880px){ .grid.cols-2{grid-template-columns:1.1fr .9fr} }

  .card{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:12px;
    box-shadow:var(--shadow);
  }

  .card .hd{
    padding:16px;
    border-bottom:1px solid var(--border);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px
  }

  .card .bd{padding:16px}
  .card .ft{padding:12px 16px;border-top:1px solid var(--border)}

  .tabs{display:flex;gap:8px;flex-wrap:wrap}

  .tab{
    padding:8px 10px;
    border-radius:10px;
    border:1px solid var(--border);
    background:var(--surface);
    cursor:pointer;
    font-weight:700;
    color:var(--ink);
  }

  .tab[aria-selected="true"]{
    background:var(--accent);
    color:#fff;
    border-color:transparent;
  }

  .amounts{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}

  .chip{
    padding:10px 12px;
    border-radius:10px;
    border:1px solid var(--border);
    background:var(--surface);
    cursor:pointer;
    font-weight:700;
    min-width:74px;
    text-align:center;
    color:var(--ink);
  }

  .chip[aria-pressed="true"]{
    outline:2px solid var(--accent);
  }

  .row{display:grid;gap:10px}
  @media(min-width:600px){ .row.cols-2{grid-template-columns:1fr 1fr} }

  input[type="number"],
  input[type="text"],
  input[type="email"],
  textarea,
  select{
    width:100%;
    box-sizing:border-box;
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 12px;
    background:var(--surface);
    color:var(--ink);
    font:inherit;
  }

  textarea{min-height:110px;resize:vertical}

  .btn{
    padding:10px 12px;
    border:1px solid var(--border);
    border-radius:10px;
    background:var(--surface);
    color:var(--ink);
    cursor:pointer;
    box-shadow:var(--shadow);
    font-weight:800;
  }

  .btn-primary{
    background:var(--accent);
    color:#fff;
    border-color:transparent
  }

  .btn-ghost{background:transparent}

  .progress{display:grid;gap:8px}

  .bar{
    height:10px;
    background:var(--surface-alt, rgba(0,0,0,.08));
    border-radius:999px;
    overflow:hidden;
    border:1px solid var(--border)
  }

  .bar > span{
    display:block;
    height:100%;
    background:linear-gradient(90deg,var(--accent),#FD9D47)
  }

  .impact-list{display:grid;gap:10px}

  .impact-item{
    display:grid;
    gap:6px;
    border:1px solid var(--border);
    border-radius:10px;
    padding:12px;
    background:var(--surface)
  }

  .impact-item h4{margin:0;font-size:1.02rem}

  details{
    border:1px solid var(--border);
    border-radius:10px;
    background:var(--surface)
  }

  details + details{margin-top:10px}

  summary{
    padding:12px 14px;
    cursor:pointer;
    font-weight:800;
    color:var(--ink)
  }

  details .faq-body{
    padding:0 14px 12px;
    color:var(--muted)
  }

  .notice{
    border:1px dashed var(--accent);
    background:var(--surface-alt, rgba(241,115,0,.08));
    color:var(--ink);
    padding:10px 12px;
    border-radius:10px;
    font-size:.95rem
  }

  .ways{display:grid;gap:10px}
  .ways .row{display:flex; gap:8px; flex-wrap:wrap}
  .ways a{text-decoration:none}
</style>
</head>

<body class="donate-page">

<div id="site-header"></div>

<main class="container">
