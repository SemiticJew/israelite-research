<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Newsletter — Semitic Jew</title>

<link rel="stylesheet" href="/styles.css"/>

<style>

/* ========================= */
/* MINIMAL NEWSLETTER PAGE  */
/* ========================= */

.newsletter-hero{
  min-height:80vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:40px 20px;
  background:var(--surface);
}

.newsletter-hero h1{
  margin:0;
  font-size:2.2rem;
  font-weight:800;
  color:var(--ink);
  max-width:700px;
}

.newsletter-hero p{
  margin-top:16px;
  max-width:600px;
  color:var(--muted);
  line-height:1.6;
  font-size:1rem;
}

.newsletter-form{
  margin-top:28px;
  width:100%;
  max-width:420px;
}

/* Match Kit form to your theme */
.formkit-form{
  background:transparent !important;
  box-shadow:none !important;
  max-width:100% !important;
}

.formkit-input{
  border-radius:10px !important;
  border:1px solid var(--border) !important;
  background:var(--surface) !important;
  color:var(--ink) !important;
}

.formkit-submit{
  border-radius:999px !important;
  background:var(--accent) !important;
  font-weight:700 !important;
}

/* Hide Kit branding */
.formkit-powered-by-convertkit-container{
  display:none !important;
}

.newsletter-note{
  margin-top:14px;
  font-size:.85rem;
  color:var(--muted);
}

</style>
</head>

<body>

<div id="site-header"></div>

<main>

  <section class="newsletter-hero">

    <h1>Get Biblical Truth Without Religious Bias</h1>

    <p>
      Structured biblical analysis, historical evidence, and uncensored research—
      delivered directly to your inbox.
    </p>

    <!-- ✅ INLINE KIT FORM -->
     <div class="newsletter-form">
    <script async data-uid="b0439d2e03" src="https://semitic-jew-inc.kit.com/b0439d2e03/index.js"></script>
  </div>

    <p class="newsletter-note">
      No spam. Unsubscribe anytime.
    </p>

  </section>

</main>

<div id="site-footer"></div>

<script src="/js/include.js"></script>

</body>
</html>
