<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Extra-Biblical Sources — Global Map</title>
<link rel="stylesheet" href="/israelite-research/styles.css"/>

<style>
  :root{
    --ink:#0b2340;
    --muted:#64748b;
    --sky:#e6ebf2;
    --panel:var(--surface);
    --shadow:rgba(2,6,23,.15);
  }

  html,body{
    height:100%;
    margin:0;
    color:var(--ink);
    background:var(--surface);
    font:14px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  }

  .container{max-width:1200px;margin:0 auto;padding:18px}
  .page-title{margin:.2rem 0 1rem;font-size:1.6rem;font-weight:800}

  .card{
    background:var(--surface);
    border:1px solid var(--sky);
    border-radius:14px;
    box-shadow:0 8px 24px var(--shadow);
    overflow:hidden
  }

  .mapwrap{width:100%;height:80vh;min-height:520px}
  .muted{color:var(--muted)}

  .status{
    margin-top:10px;
    border:1px dashed #cbd5e1;
    border-radius:10px;
    padding:8px 10px;
    color:#334155;
    background:var(--surface)
  }

  .status b{color:var(--ink)}

  .drawer{
    position:fixed;
    top:0;
    right:0;
    height:100vh;
    width:min(460px,92vw);
    background:var(--panel);
    border-left:1px solid #e5e7eb;
    box-shadow:-12px 0 32px var(--shadow);
    transform:translateX(100%);
    transition:transform .28s ease;
    z-index:9999;
    display:flex;
    flex-direction:column
  }

  .drawer.open{transform:translateX(0)}
  .drawer-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #eef2f7}
  .drawer-title{margin:0;font-size:1.1rem;font-weight:800}
  .drawer-body{padding:14px 16px;overflow:auto}

  .section{margin:10px 0 14px}
  .section h3{margin:.2rem 0 .5rem;font-size:1rem}

  .ref{
    padding:10px 12px;
    border:1px solid #e5e7eb;
    border-radius:10px;
    margin:8px 0;
    background:var(--surface)
  }

  .hist{
    padding:10px 12px;
    border:1px solid #e5e7eb;
    border-radius:10px;
    margin:8px 0;
    background:var(--surface)
  }

  .hist .claim{margin:0 0 6px;font-weight:600}
  .hist .meta{font-size:.85rem;color:#475569}
  .hist a{color:var(--ink);text-decoration:underline}

  .badge{
    display:inline-block;
    font-size:.72rem;
    border:1px solid #e5e7eb;
    border-radius:999px;
    padding:2px 6px;
    margin-left:6px;
    background:#f1f5f9;
    color:var(--ink)
  }

  .drawer-actions{display:flex;gap:8px;align-items:center;padding:8px 16px 14px;border-top:1px solid #eef2f7}
  .btn{border:1px solid #d1d5db;background:var(--surface);border-radius:10px;padding:8px 10px;cursor:pointer}
  .btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}

  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .tag{font-size:.78rem;background:#eef2f7;border:1px solid #e5e7eb;border-radius:999px;padding:2px 8px}
</style>
</head>

<body>

<div id="site-header"></div>

<main class="container">
  <h1 class="page-title">Interactive Global Map</h1>
  <div class="card">
    <div id="chart-globe" class="mapwrap" aria-label="Interactive global map"></div>
  </div>

  <div class="status">
    <b>Notes:</b> <span id="note-status">loading…</span> ·
    <b>Keys:</b> <span id="note-keys">0</span> ·
    <b>Matched Regions:</b> <span id="note-matched">0</span> ·
    <b>Total Regions:</b> <span id="total-regions">0</span>
  </div>

  <p class="muted" style="margin:.6rem 0 0">
    Hover a country for a quick note. Click to open detailed information.
  </p>
</main>

<div id="site-footer"></div>

<script src="/israelite-research/js/shims.js" defer></script>
<script src="/israelite-research/js/include.js" defer></script>

<script src="https://cdn.amcharts.com/lib/5/index.js"></script>
<script src="https://cdn.amcharts.com/lib/5/map.js"></script>
<script src="https://cdn.amcharts.com/lib/5/themes/Animated.js"></script>
<script src="https://cdn.amcharts.com/lib/5/geodata/worldLow.js"></script>

<script src="/israelite-research/js/globe/all-outline.js?v=1761428678"></script>

</body>
</html>
