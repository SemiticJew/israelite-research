<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1" name="viewport"/>
<title>Israelite Encyclopedia — Semitic Jew</title>

<link rel="stylesheet" href="/styles.css"/>

<style>
  .container{max-width:1400px;margin:0 auto;padding:0 16px}

  .topbar{
    position:sticky;
    top:0;
    z-index:50;
    background:var(--surface);
    border-bottom:1px solid var(--border);
  }

  .topbar-inner{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 16px
  }

  .title{font-size:1.2rem;font-weight:800;margin:0}

  .layout{
    display:grid;
    grid-template-columns:380px 1fr;
    gap:16px;
    margin:14px 0 32px
  }

  @media (max-width:980px){
    .layout{grid-template-columns:1fr}
    .panel-right{order:-1}
  }

  .panel{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px
  }

  .panel h3{
    margin:10px 14px;
    font-size:1rem;
    color:var(--brand)
  }

  .facets{
    border-bottom:1px solid var(--border);
    padding:10px 12px
  }

  .az{
    display:grid;
    grid-template-columns:repeat(13,1fr);
    gap:4px
  }

  .az button{
    border:1px solid var(--border);
    background:var(--surface);
    border-radius:6px;
    padding:.3rem 0;
    font:inherit;
    cursor:pointer
  }

  .az button:hover{
    background:var(--surface-alt, rgba(0,0,0,.04));
  }

  .results{
    max-height:calc(100vh - 260px);
    overflow:auto;
    padding:8px 8px 12px
  }

  .card{
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px;
    margin:8px 4px;
    cursor:pointer;
    background:var(--surface);
  }

  .card:hover{
    box-shadow:0 4px 12px rgba(0,0,0,.08)
  }

  .card .line1{
    display:flex;
    align-items:baseline;
    gap:.5rem
  }

  .card .term{
    font-weight:800;
    color:var(--ink);
  }

  .card .abstract{
    margin-top:.25rem;
    font-size:.9rem;
    color:var(--muted)
  }

  .reader{
    padding:10px 14px
  }

  .reader .head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    border-bottom:1px solid var(--border);
    padding-bottom:8px
  }

  .reader .r-title{
    margin:0;
    font-size:1.4rem;
    font-weight:800;
    color:var(--ink);
  }

  .reader article{
    line-height:1.55;
    margin-top:10px
  }

  .empty{
    padding:22px;
    color:var(--muted)
  }

  .r-toolbar{
    display:flex;
    gap:.5rem;
    align-items:center;
    margin-top:8px
  }

  .r-toolbar input[type="search"]{
    flex:1;
    border:1px solid var(--border);
    border-radius:8px;
    padding:.55rem .7rem;
    font:inherit;
    background:var(--surface);
    color:var(--ink);
  }

  .r-toolbar .btn{
    border:1px solid var(--border);
    background:var(--surface);
    border-radius:8px;
    padding:.5rem .7rem;
    cursor:pointer;
    color:var(--ink);
  }

  .r-toolbar .btn:hover{
    background:var(--surface-alt, rgba(0,0,0,.04));
  }
</style>
</head>

<body class="bib-refs" data-page="encyclopedia">

<div id="site-header"></div>

<div class="topbar">
  <div class="topbar-inner container">
    <h1 class="title">Israelite Encyclopedia</h1>
  </div>
</div>

<main class="container layout">
  <section aria-label="Results and facets" class="panel panel-left">
    <h3>Browse</h3>
    <div class="facets">
      <div aria-label="A–Z jump" class="az"></div>
    </div>
    <div aria-label="Search results" class="results" id="results" role="listbox">
      <div class="empty">Type in the search or select a letter to browse.</div>
    </div>
  </section>

  <aside aria-label="Reading panel" class="panel panel-right">
    <div class="reader" id="reader">
      <div class="head">
        <h2 class="r-title">Select an entry</h2>
        <form autocomplete="off" class="r-toolbar" onsubmit="return false;">
          <input aria-label="Search encyclopedia" id="q" name="q_ency"
                 placeholder="Search (e.g., Judeans, Gentiles, Kushites)…"
                 spellcheck="false" type="search"/>
          <button class="btn" id="clearQ" type="button">Clear</button>
        </form>
      </div>

      <article class="article-content">
        <div class="empty">
          Definitions will appear here when you select a result.
        </div>
      </article>
    </div>
  </aside>
</main>

<div id="site-footer"></div>

<!-- Scripts -->
<script src="/js/include.js" defer></script>
<script src="/js/citations.js" defer></script>
<script src="/js/xref-hover.js" defer></script>
<script src="/js/encyclopedia.seealso.js" defer></script>
<script src="/js/encyclopedia.seealso.autolink.js" defer></script>
<script src="/js/encyclopedia.app.js" defer></script>
<script src="/js/encyclopedia.seealso.render.js" defer></script>
<script src="js/encyclopedia.linkify.js"></script>
<script src="js/xref-rebind.js"></script>
<script src="js/xref-url-override.js?v=1762745482"></script>

</body>
</html>
