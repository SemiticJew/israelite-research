<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1" name="viewport"/>
<title>All Articles — Semitic Jew</title>
<link href="/israelite-research/styles.css" rel="stylesheet"/>

<style>
.container{
  max-width:900px;
  margin:0 auto;
  padding:0 20px;
}

/* Header */
.page-hero{
  padding:60px 0 40px;
  border-bottom:1px solid var(--border);
}

.page-title{
  margin:0;
  font-size:2.2rem;
  font-weight:800;
}

.page-subtitle{
  margin-top:8px;
  font-size:.95rem;
  color:var(--muted);
}

/* Controls */
.controls{
  margin:30px 0 40px;
  display:flex;
  gap:16px;
}

.controls input,
.controls select{
  height:40px;
  padding:0 12px;
  border:1px solid var(--border);
  border-radius:8px;
  background:var(--surface);
  color:var(--ink);
  font-size:.9rem;
}

/* Archive List */
.archive{
  display:flex;
  flex-direction:column;
  gap:28px;
}

.entry{
  padding-bottom:22px;
  border-bottom:1px solid var(--border);
}

.entry:last-child{
  border-bottom:none;
}

/* Title */
.entry-title{
  font-size:1.15rem;
  font-weight:700;
  margin:0 0 6px;
}

.entry-title a{
  text-decoration:none;
  color:var(--ink);
}

.entry-title a:hover{
  text-decoration:underline;
}

/* Metadata */
.meta{
  font-size:.85rem;
  color:var(--muted);
  margin-bottom:8px;
}

.meta span{
  margin-right:14px;
}

/* Excerpt */
.entry-excerpt{
  font-size:.95rem;
  line-height:1.6;
  color:var(--ink);
}

/* Author modal constraint */
#author-modal .modal-content{
  max-width:420px !important;
  width:92%;
  border-radius:12px;
}
</style>
</head>

<body>

<div id="site-header"></div>

<main class="container">

  <section class="page-hero">
    <h1 class="page-title">Article Archive</h1>
    <p class="page-subtitle">
      A chronological record of theological, logical, and exegetical publications.
    </p>
  </section>

  <section class="controls">
    <input type="search" id="search" placeholder="Search title or excerpt…">
    <select id="year">
      <option value="">All Years</option>
    </select>
  </section>

  <section class="archive" id="results">
    <!-- JS injects entries -->
  </section>

</main>

<div id="site-footer"></div>

<script src="/israelite-research/js/include.js"></script>

</body>
</html>
