<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1" name="viewport"/>
<title>All Articles — Semitic Jew</title>
<link href="/israelite-research/styles.css" rel="stylesheet"/>

<style>
.container{max-width:1200px;margin:0 auto;padding:0 16px}

/* Hero */
.page-hero{
  padding:20px 0 16px;
  border-bottom:1px solid var(--border);
  background:var(--surface);
}
.page-title{margin:0;font-size:2rem;font-weight:800;color:var(--ink)}
.page-subtitle{margin:6px 0 0;color:var(--muted)}

/* Filters */
.filters{
  position:sticky;
  top:0;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  z-index:5;
}
.filters .row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
  padding:12px 0;
}
.filters .row > *{
  height:40px;
  border:1px solid var(--border);
  border-radius:12px;
  background:var(--surface);
  color:var(--ink);
  padding:0 12px;
}
.filters input[type="search"]{flex:1;min-width:180px}
.filters .clear{cursor:pointer}
.filters .count{margin-left:auto;border:none;height:auto;padding:0;color:var(--muted)}

/* Group Header */
.group{
  margin:28px 0 10px;
  font-weight:700;
  color:var(--muted);
}

/* Modern Grid */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:28px;
  padding-bottom:60px;
}

/* Modern Card */
.card{
  max-width:260px;
  height:400px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:18px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 20px 45px rgba(0,0,0,.12);
  border-color:var(--brand);
}

.card a{
  color:inherit;
  text-decoration:none;
  display:flex;
  flex-direction:column;
  height:100%;
}

/* Image */
.card-media{
  height:150px;
  overflow:hidden;
  position:relative;
  background:var(--surface-alt);
}

.card-media img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:transform .35s ease;
}

.card:hover .card-media img{
  transform:scale(1.06);
}

.label-pill{
  position:absolute;
  left:10px;
  top:10px;
  padding:.25rem .5rem;
  font-size:.7rem;
  background:rgba(0,0,0,.6);
  color:#fff;
  border-radius:6px;
}

/* Body */
.card-body{
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

.card-title{
  font-size:1rem;
  font-weight:800;
  line-height:1.3;
  color:var(--ink);
}

.card-excerpt{
  font-size:.9rem;
  line-height:1.45;
  color:var(--muted);
  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.card-date{
  font-size:.8rem;
  color:var(--muted);
}

/* Footer */
.card-foot{
  margin-top:auto;
  padding:14px 16px;
  display:flex;
  align-items:center;
  gap:8px;
  border-top:1px solid var(--border);
}

.author-avatar{
  width:26px;
  height:26px;
  border-radius:50%;
}

.author-name{
  font-size:.85rem;
  font-weight:600;
  color:var(--ink);
}

/* FIX Author Modal Size */
#author-modal .modal-content{
  max-width:420px !important;
  width:92%;
  border-radius:16px;
}

#author-modal .modal-body{
  font-size:.95rem;
  line-height:1.6;
}

@media (prefers-reduced-motion: reduce){
  .card{transition:none}
}
</style>
</head>

<body class="articles-all">

<div id="site-header"></div>

<main>
  <section class="page-hero">
    <div class="container">
      <h1 class="page-title">All articles</h1>
      <p class="page-subtitle">Browse by year, month, date, Bible book, chapter, verse, and author.</p>
    </div>
  </section>

  <section class="filters">
    <div class="container">
      <div class="row">
        <select id="f-year"><option value="">Year</option></select>
        <select id="f-month"><option value="">Month</option></select>
        <input id="f-date" type="date"/>
        <select id="f-book"><option value="">Bible book</option></select>
        <select id="f-chapter"><option value="">Chapter</option></select>
        <input id="f-verse" type="text" placeholder="Verse (e.g., 3:16)"/>
        <select id="f-author"><option value="">Author</option></select>
        <input id="f-search" type="search" placeholder="Search title/excerpt…"/>
        <button class="clear" id="f-clear" type="button">Clear</button>
        <span class="count" id="f-count"></span>
      </div>
    </div>
  </section>

  <section class="container" id="results"></section>
</main>

<div id="site-footer"></div>

<script src="/israelite-research/js/include.js"></script>

</body>
</html>
