<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1" name="viewport"/>
<title>Collected Writings — Semitic Jew</title>
<link href="/israelite-research/styles.css" rel="stylesheet"/>

<style>
.container{
  max-width:1100px;
  margin:0 auto;
  padding:0 24px;
}

/* HERO */
.page-hero{
  padding:60px 0 40px;
  border-bottom:1px solid var(--border);
}

.page-title{
  margin:0;
  font-size:2.4rem;
  font-weight:900;
}

.page-subtitle{
  margin-top:10px;
  color:var(--muted);
  font-size:1rem;
}

/* DISCIPLINE */
.discipline{
  padding:60px 0;
  border-bottom:1px solid var(--border);
}

.discipline-title{
  font-size:1.4rem;
  font-weight:800;
  margin-bottom:30px;
}

/* SUBDISCIPLINE */
.subdiscipline{
  margin-bottom:30px;
}

.subdiscipline-title{
  font-size:1.05rem;
  font-weight:700;
  margin-bottom:12px;
  color:var(--brand);
}

/* ENTRY LIST */
.entry{
  margin-bottom:10px;
  padding-left:10px;
}

.entry a{
  text-decoration:none;
  color:var(--ink);
  font-weight:600;
}

.entry a:hover{
  text-decoration:underline;
}

.entry-meta{
  font-size:.8rem;
  color:var(--muted);
  margin-top:2px;
}
</style>
</head>

<body>

<div id="site-header"></div>

<main class="container">

  <section class="page-hero">
    <h1 class="page-title">Collected Writings</h1>
    <p class="page-subtitle">
      A structured body of theological, logical, and analytical work.
    </p>
  </section>

  <section id="library"></section>

</main>

<div id="site-footer"></div>

<script>
(function(){

  const LIBRARY = document.getElementById("library");

  function fmtDate(iso){
    return new Date(iso).toLocaleDateString(undefined,{
      year:'numeric',
      month:'long',
      day:'numeric'
    });
  }

  function groupData(data){
    const map = {};

    data.forEach(article=>{
      const d = article.discipline || "Uncategorized";
      const s = article.subdiscipline || "General";

      map[d] ??= {};
      map[d][s] ??= [];
      map[d][s].push(article);
    });

    return map;
  }

  function render(data){
    const grouped = groupData(data);

    Object.keys(grouped).forEach(discipline=>{
      const dSection = document.createElement("section");
      dSection.className = "discipline";

      const dTitle = document.createElement("div");
      dTitle.className = "discipline-title";
      dTitle.textContent = discipline;
      dSection.appendChild(dTitle);

      Object.keys(grouped[discipline]).forEach(sub=>{
        const subDiv = document.createElement("div");
        subDiv.className = "subdiscipline";

        const subTitle = document.createElement("div");
        subTitle.className = "subdiscipline-title";
        subTitle.textContent = sub;
        subDiv.appendChild(subTitle);

        grouped[discipline][sub]
          .sort((a,b)=> new Date(b.date) - new Date(a.date))
          .forEach(article=>{
            const entry = document.createElement("div");
            entry.className = "entry";
            entry.innerHTML = `
              <a href="${article.href}">${article.title}</a>
              <div class="entry-meta">
                ${fmtDate(article.date)} • ${article.author}
              </div>
            `;
            subDiv.appendChild(entry);
          });

        dSection.appendChild(subDiv);
      });

      LIBRARY.appendChild(dSection);
    });
  }

  async function boot(){
    let data = [];

    try{
      const res = await fetch('/israelite-research/data/articles-index.json',{cache:'no-store'});
      if(res.ok){
        data = await res.json();
      }
    }catch{}

    if(!data.length){
      data = [
        {
          title:"Three Laws of Logic",
          href:"/israelite-research/articles/three-laws-of-logic.html",
          date:"2025-04-02",
          author:"Semitic Jew",
          discipline:"Logic & Philosophy",
          subdiscipline:"Laws of Logic"
        },
        {
          title:"Is Creation Logical?",
          href:"/israelite-research/articles/is-creation-logical.html",
          date:"2025-08-20",
          author:"Semitic Jew",
          discipline:"Logic & Philosophy",
          subdiscipline:"Metaphysics"
        },
        {
          title:"Who Are the Gentiles?",
          href:"/israelite-research/articles/gentiles.html",
          date:"2025-05-28",
          author:"Semitic Jew",
          discipline:"Israelite Identity & Anthropology",
          subdiscipline:"Ethnicity & Genealogy"
        }
      ];
    }

    render(data);
  }

  boot();

})();
</script>

<script src="/israelite-research/js/include.js"></script>

</body>
</html>
