<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1" name="viewport"/>
<title>All Articles — Semitic Jew</title>
<link href="/israelite-research/styles.css" rel="stylesheet"/>

<style>
.container{
  max-width:1000px;
  margin:0 auto;
  padding:0 20px;
}

/* Hero */
.page-hero{
  padding:60px 0 40px;
  text-align:center;
}

.page-title{
  margin:0;
  font-size:2.4rem;
  font-weight:900;
}

.page-subtitle{
  margin-top:12px;
  color:var(--muted);
  font-size:1rem;
}

/* Simple Controls */
.controls{
  display:flex;
  gap:16px;
  justify-content:center;
  margin-bottom:50px;
}

.controls input,
.controls select{
  height:42px;
  padding:0 14px;
  border:1px solid var(--border);
  border-radius:12px;
  background:var(--surface);
  color:var(--ink);
  font-size:.95rem;
}

/* Clean Grid */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:36px;
}

/* Minimal Card */
.card{
  display:flex;
  flex-direction:column;
  gap:14px;
  text-decoration:none;
  color:inherit;
  transition:transform .25s ease;
}

.card:hover{
  transform:translateY(-4px);
}

/* Image */
.card-media{
  border-radius:14px;
  overflow:hidden;
}

.card-media img{
  width:100%;
  height:170px;
  object-fit:cover;
  display:block;
  transition:transform .35s ease;
}

.card:hover img{
  transform:scale(1.05);
}

/* Text */
.card-title{
  font-size:1.05rem;
  font-weight:800;
  line-height:1.3;
}

.card-excerpt{
  font-size:.92rem;
  color:var(--muted);
  line-height:1.5;
}

.card-date{
  font-size:.8rem;
  color:var(--muted);
}

/* Author line */
.card-author{
  font-size:.85rem;
  font-weight:600;
  color:var(--brand);
}

/* Modal size fix */
#author-modal .modal-content{
  max-width:420px !important;
  width:92%;
  border-radius:16px;
}

</style>
</head>

<body>

<div id="site-header"></div>

<main class="container">

  <section class="page-hero">
    <h1 class="page-title">All Articles</h1>
    <p class="page-subtitle">
      Scripture. Logic. Precision.
    </p>
  </section>

  <section class="controls">
    <input type="search" id="search" placeholder="Search articles…">
    <select id="year">
      <option value="">All Years</option>
    </select>
  </section>

  <section class="cards" id="results">
    <!-- JS injects cards -->
  </section>

</main>

<div id="site-footer"></div>

<script src="/israelite-research/js/include.js"></script>

</body>
</html>
