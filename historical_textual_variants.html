<!DOCTYPE html>
<html lang="en" data-theme="">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>Historical Textual Variants — Semitic Jew</title>

<link href="/israelite-research/styles.css" rel="stylesheet"/>

<style>
  .variants-page .container{max-width:1200px;margin:0 auto;padding:0 16px}

  .variants-page .page-header{padding:24px 0 8px}
  .variants-page .page-title{margin:0;font-size:2rem;font-weight:800}

  .variants-page .controls{
    display:grid;
    grid-template-columns:repeat(6,minmax(0,1fr));
    gap:.75rem;
    margin:16px 0 20px
  }

  .variants-page .controls .full{grid-column:1/-1}

  .variants-page select,
  .variants-page input[type="text"]{
    width:100%;
    padding:.6rem;
    border:1px solid var(--border);
    border-radius:8px;
    background:var(--surface);
    color:var(--ink);
  }

  .variants-page .chipbar{display:flex;flex-wrap:wrap;gap:.5rem}

  .variants-page .chip{
    display:inline-flex;
    align-items:center;
    gap:.4rem;
    padding:.35rem .6rem;
    border-radius:999px;
    border:1px solid var(--border);
    background:var(--surface);
    cursor:pointer;
    font-size:.9rem;
    color:var(--ink);
  }

  .variants-page .results{
    overflow-x:auto;
    border:1px solid var(--border);
    border-radius:12px;
    background:var(--surface);
  }

  .variants-page table{
    width:100%;
    border-collapse:separate;
    border-spacing:0
  }

  .variants-page th,
  .variants-page td{
    padding:.8rem;
    vertical-align:top;
    border-bottom:1px solid var(--border);
  }

  .variants-page thead th{
    position:sticky;
    top:0;
    background:var(--surface);
    font-weight:700;
    border-bottom:2px solid var(--border);
    white-space:nowrap;
  }

  .variants-page tbody tr:hover{
    background:var(--surface-alt, rgba(0,0,0,.04));
  }

  .variants-page .ref{font-weight:700}
  .variants-page .note{font-size:.85rem;margin-top:.25rem;color:var(--muted)}

  .variants-page .pill{
    display:inline-block;
    padding:.15rem .5rem;
    border-radius:999px;
    background:var(--brand);
    color:#fff;
    font-size:.75rem;
    margin-right:.35rem;
  }

  @media (max-width:900px){
    .variants-page .controls{
      grid-template-columns:repeat(2,minmax(0,1fr))
    }
  }
</style>
</head>

<body class="variants-page">

<div id="site-header"></div>

<main>
  <div class="container">
    <div class="page-header">
      <h1 class="page-title">Historical Textual Variants</h1>
      <p class="page-subtitle">
        Side-by-side readings from major textual traditions with concise notes.
      </p>
    </div>

    <section class="controls">
      <div>
        <label for="bookSel">Book</label>
        <select id="bookSel"></select>
      </div>
      <div>
        <label for="chapSel">Chapter</label>
        <select id="chapSel"></select>
      </div>
      <div>
        <label for="verseSel">Verse</label>
        <select id="verseSel"></select>
      </div>
      <div class="full">
        <label for="searchBox">Search keywords</label>
        <input id="searchBox" type="text"
               placeholder="e.g., virgin, pierced, Egypt, ships"/>
      </div>
      <div class="full">
        <div class="chipbar" id="traditionsBar"></div>
      </div>
    </section>

    <section class="results">
      <table id="variantsTable">
        <thead>
          <tr>
            <th style="min-width:180px">Reference</th>
            <th>Masoretic Text (MT)</th>
            <th>Septuagint (LXX)</th>
            <th>Dead Sea Scrolls (DSS)</th>
            <th>Vulgate</th>
            <th>Peshitta</th>
          </tr>
        </thead>
        <tbody id="variantsBody"></tbody>
      </table>
    </section>
  </div>
</main>

<div id="site-header"></div>
<div id="site-footer"></div>
<script src="/israelite-research/js/include.js" defer></script>
