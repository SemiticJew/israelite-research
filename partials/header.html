<!-- Universal Header Partial (Elite Refined Version) -->
<header class="site-header-bar">
  <style>
    #site-header .site-header-bar{
      background: var(--surface, #ffffff);
      color: var(--ink, #0b2340);
      border-bottom: 1px solid var(--border, #e6ebf2);
      position:relative;
      z-index:1000;
    }

    #site-header .header-inner{
      max-width:1200px;
      margin:0 auto;
      padding:16px 32px; /* breathing room */
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
    }

    /* LOGO */
    #site-header .brand img{
      height:44px;
    }

    /* NAVIGATION */
    #site-header nav.primary{
      display:flex;
      gap:36px;
      margin-left:40px;
      font-family: Georgia, serif;
      font-size:1.05rem;
      align-items:center;
    }

    #site-header nav.primary > .nav-item{
      position:relative;
    }

    #site-header nav.primary a{
      text-decoration:none;
      color:var(--ink,#0b2340);
      padding:6px 0;
      display:inline-block;
      transition:opacity .2s ease;
    }

    #site-header nav.primary a:hover{
      opacity:.75;
    }

    /* DROPDOWN */
    #site-header .dropdown{
      position:absolute;
      top:140%;
      left:0;
      background:var(--surface,#fff);
      border:1px solid var(--border,#e6ebf2);
      border-radius:14px;
      box-shadow:0 20px 40px rgba(0,0,0,.12);
      padding:12px 0;
      min-width:220px;
      opacity:0;
      transform:translateY(10px);
      transition:all .2s ease;
      pointer-events:none;
    }

    #site-header .dropdown a{
      display:block;
      padding:10px 18px;
      font-size:.95rem;
    }

    #site-header .nav-item:hover .dropdown{
      opacity:1;
      transform:translateY(0);
      pointer-events:auto;
    }

    /* RIGHT TOOLS */
    #site-header .tools{
      display:flex;
      align-items:center;
      gap:14px;
    }

    #site-header .icon-btn{
      width:42px;
      height:42px;
      border-radius:999px;
      border:1px solid transparent;
      background:transparent;
      color:var(--ink,#0b2340);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition:all .2s ease;
    }

    #site-header .icon-btn:hover{
      background:rgba(0,0,0,.05);
      border-color:var(--border,#e6ebf2);
    }

    #site-header .give-btn{
      padding:9px 18px;
      border-radius:999px;
      background:var(--accent,#F17300);
      color:#fff;
      font-weight:700;
      text-decoration:none;
      transition:all .2s ease;
    }

    #site-header .give-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 10px 25px rgba(241,115,0,.35);
    }

    /* DARK MODE */
    html[data-theme="dark"]{
      --surface:#0f172a;
      --ink:#f1f5f9;
      --border:#1e293b;
    }
  </style>

  <div class="header-inner">

    <!-- LOGO -->
    <a class="brand" href="/israelite-research/index.html">
      <img id="site-logo"
           src="/israelite-research/images/black-logo-letters.png"
           alt="Semitic Jew Logo">
    </a>

    <!-- NAV -->
    <nav class="primary" aria-label="Primary">

      <div class="nav-item">
        <a href="/israelite-research/index.html">Home</a>
      </div>

      <div class="nav-item">
        <a href="/israelite-research/articles.html">Articles</a>
      </div>

      <div class="nav-item">
        <a href="#">About ▾</a>
        <div class="dropdown">
          <a href="/israelite-research/israelite-catechism.html">Catechism</a>
        </div>
      </div>

      <div class="nav-item">
        <a href="#">Contact ▾</a>
        <div class="dropdown">
          <a href="/israelite-research/newsletter.html">Newsletter</a>
        </div>
      </div>

      <div class="nav-item">
        <a href="#">Resources ▾</a>
        <div class="dropdown">
          <a href="https://podcasts.apple.com/us/podcast/semitic-jew/id1693178004" target="_blank">Apple Podcast</a>
          <a href="/israelite-research/biblia.html">Biblica</a>
          <a href="/israelite-research/israelite-catechism.html">Catechism</a>
          <a href="https://open.spotify.com/show/0GvSSHiBeVAmvHMIXP6lOi?si=0264d1aebb8d4db3" target="_blank">Spotify Podcast</a>
          <a href="https://www.youtube.com/channel/UC6ukYTYZ8YqsSYq4-nl11gA" target="_blank">YouTube Page</a>
        </div>
      </div>

    </nav>

    <!-- TOOLS -->
    <div class="tools">

      <!-- Search -->
      <a class="icon-btn"
         href="/israelite-research/search.html"
         aria-label="Search">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="7"
                  stroke="currentColor" stroke-width="2" fill="none"/>
          <line x1="16.5" y1="16.5" x2="21" y2="21"
                stroke="currentColor" stroke-width="2"
                stroke-linecap="round"/>
        </svg>
      </a>

      <!-- Theme Toggle -->
      <button class="icon-btn"
              id="theme-toggle"
              aria-label="Toggle Theme">
        <svg id="theme-icon" width="20" height="20" viewBox="0 0 24 24"></svg>
      </button>

      <!-- Give -->
      <a class="give-btn"
         href="/israelite-research/donate.html">
        Give
      </a>

    </div>
  </div>

  <script>
    (function(){
      const html = document.documentElement;
      const toggle = document.getElementById('theme-toggle');
      const icon = document.getElementById('theme-icon');
      const logo = document.getElementById('site-logo');

      function setIcon(theme){
        if(theme === 'dark'){
          icon.innerHTML = '<circle cx="12" cy="12" r="5" fill="currentColor"/>';
        } else {
          icon.innerHTML =
            '<path d="M12 2v2M12 20v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M2 12h2M20 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4" stroke="currentColor" stroke-width="2"/>';
        }
      }

      function applyTheme(theme){
        html.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        logo.src = theme === 'dark'
          ? '/israelite-research/images/white-logo-letters.png'
          : '/israelite-research/images/black-logo-letters.png';
        setIcon(theme);
      }

      const saved = localStorage.getItem('theme') || 'light';
      applyTheme(saved);

      toggle.addEventListener('click', ()=>{
        const current = html.getAttribute('data-theme');
        applyTheme(current === 'dark' ? 'light' : 'dark');
      });
    })();
  </script>

</header>
