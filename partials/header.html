<!-- Universal Header Partial (Upgraded) -->
<header class="site-header-bar">
  <style>
    #site-header .site-header-bar{
      background: var(--surface, #ffffff);
      color: var(--ink, #0b2340);
      border-bottom: 1px solid var(--border, #e6ebf2);
      position:relative;
      z-index:1000;
    }

    #site-header .header-inner{
      max-width:1200px;
      margin:0 auto;
      padding:12px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
    }

    /* ---------------- LOGO ---------------- */
    #site-header .brand img{
      height:42px;
      transition:opacity .2s ease;
    }

    /* ---------------- NAV ---------------- */
    #site-header nav.primary{
      display:flex;
      gap:18px;
      align-items:center;
      font-weight:600;
    }

    #site-header nav.primary > .nav-item{
      position:relative;
    }

    #site-header nav.primary a{
      text-decoration:none;
      color:var(--ink,#0b2340);
      padding:8px 4px;
      display:inline-block;
    }

    /* Dropdown */
    #site-header .dropdown{
      position:absolute;
      top:100%;
      left:0;
      background:var(--surface,#fff);
      border:1px solid var(--border,#e6ebf2);
      border-radius:10px;
      box-shadow:0 10px 30px rgba(0,0,0,.08);
      padding:10px 0;
      min-width:180px;
      display:none;
    }

    #site-header .dropdown a{
      display:block;
      padding:8px 14px;
      white-space:nowrap;
    }

    #site-header .nav-item:hover .dropdown{
      display:block;
    }

    /* ---------------- RIGHT TOOLS ---------------- */
    #site-header .tools{
      display:flex;
      align-items:center;
      gap:12px;
    }

    #site-header .icon-btn{
      width:40px;
      height:40px;
      border-radius:999px;
      border:1px solid var(--border,#e6ebf2);
      background:var(--surface,#fff);
      color:var(--ink,#0b2340);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition:all .15s ease;
    }

    #site-header .icon-btn:hover{
      transform:translateY(-1px);
      box-shadow:0 8px 20px rgba(0,0,0,.1);
    }

    #site-header .give-btn{
      padding:8px 14px;
      border-radius:999px;
      background:var(--accent,#F17300);
      color:#fff;
      font-weight:700;
      text-decoration:none;
      transition:transform .15s ease;
    }

    #site-header .give-btn:hover{
      transform:translateY(-1px);
    }

    /* ---------------- DARK MODE ---------------- */
    html[data-theme="dark"]{
      --surface:#0f172a;
      --ink:#f1f5f9;
      --border:#1e293b;
    }
  </style>

  <div class="header-inner">

    <!-- LOGO -->
    <a class="brand" href="/israelite-research/index.html">
      <img id="site-logo" src="/israelite-research/images/black-logo-letters.png" alt="Semitic Jew Logo">
    </a>

    <!-- CENTER NAV -->
    <nav class="primary" aria-label="Primary">

      <div class="nav-item">
        <a href="#">Articles ▾</a>
        <div class="dropdown">
          <a href="/israelite-research/articles.html">All Articles</a>
          <a href="/israelite-research/apologetics.html">Apologetics</a>
        </div>
      </div>

      <div class="nav-item">
        <a href="#">Texts ▾</a>
        <div class="dropdown">
          <a href="/israelite-research/biblia.html">Biblia</a>
          <a href="/israelite-research/israelite-catechism.html">Catechism</a>
        </div>
      </div>

      <div class="nav-item">
        <a href="#">Media ▾</a>
        <div class="dropdown">
          <a href="/israelite-research/media.html">Podcast</a>
          <a href="/israelite-research/events.html">Events</a>
        </div>
      </div>

    </nav>

    <!-- RIGHT SIDE -->
    <div class="tools">

      <!-- Search -->
      <a class="icon-btn" href="/israelite-research/search.html" aria-label="Search">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" fill="none"/>
          <line x1="16.5" y1="16.5" x2="21" y2="21"
                stroke="currentColor" stroke-width="2"
                stroke-linecap="round"/>
        </svg>
      </a>

      <!-- Theme Toggle -->
      <button class="icon-btn" id="theme-toggle" aria-label="Toggle Theme">
        ☾
      </button>

      <!-- Give -->
      <a class="give-btn" href="/israelite-research/donate.html">
        Give
      </a>

    </div>
  </div>

  <!-- Theme + Logo Script -->
  <script>
    (function(){
      const html = document.documentElement;
      const toggle = document.getElementById('theme-toggle');
      const logo = document.getElementById('site-logo');

      function applyTheme(theme){
        html.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        logo.src = theme === 'dark'
          ? '/israelite-research/images/white-logo-letters.png'
          : '/israelite-research/images/black-logo-letters.png';
      }

      const saved = localStorage.getItem('theme') || 'light';
      applyTheme(saved);

      toggle.addEventListener('click', ()=>{
        const current = html.getAttribute('data-theme');
        applyTheme(current === 'dark' ? 'light' : 'dark');
      });
    })();
  </script>

</header>
