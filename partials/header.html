<!-- Universal Header Partial (Stabilized Light/Dark Version) -->
<header id="site-header" class="site-header-bar">

  <style>
    #site-header{
      background: var(--surface, #ffffff);
      color: var(--ink, #0b2340);
      border-bottom: 1px solid var(--border, #e6ebf2);
      position:relative;
      z-index:1000;
    }

    #site-header .header-inner{
      max-width:1200px;
      margin:0 auto;
      padding:16px 32px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:20px;
    }

    /* LOGO */
    #site-header .brand img{
      height:52px;
    }

    /* NAVIGATION */
    #site-header nav.primary{
      display:flex;
      gap:36px;
      margin-left:40px;
      font-family: Georgia, serif;
      font-size:1.05rem;
      align-items:center;
    }

    #site-header .nav-item{
      position:relative;
    }

    #site-header .nav-link{
      display:flex;
      align-items:center;
      gap:6px;
      text-decoration:none;
      color:var(--ink,#0b2340);
      padding:6px 0;
      transition:opacity .2s ease;
    }

    #site-header .nav-link:hover{
      opacity:.75;
    }

    /* Chevron */
    #site-header .arrow{
      display:inline-flex;
      transition:transform .25s ease;
    }

    #site-header .nav-item:hover .arrow{
      transform:rotate(180deg);
    }

    /* DROPDOWN */
    #site-header .dropdown{
      position:absolute;
      top:100%;
      left:0;
      background:var(--surface,#fff);
      border:1px solid var(--border,#e6ebf2);
      border-radius:14px;
      box-shadow:0 20px 40px rgba(0,0,0,.12);
      padding:12px 0;
      min-width:220px;
      opacity:0;
      visibility:hidden;
      transform:translateY(8px);
      transition:all .2s ease;
    }

    #site-header .dropdown a{
      display:block;
      padding:10px 18px;
      font-size:.95rem;
      text-decoration:none;
      color:var(--ink,#0b2340);
    }

    #site-header .dropdown a:hover{
      background:rgba(0,0,0,.04);
    }

    #site-header .nav-item:hover .dropdown{
      opacity:1;
      visibility:visible;
      transform:translateY(0);
    }

    /* RIGHT TOOLS */
    #site-header .tools{
      display:flex;
      align-items:center;
      gap:14px;
    }

    #site-header .icon-btn{
      width:42px;
      height:42px;
      border-radius:999px;
      border:1px solid transparent;
      background:transparent;
      color:var(--ink,#0b2340);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition:all .2s ease;
    }

    #site-header .icon-btn:hover{
      background:rgba(0,0,0,.05);
      border-color:var(--border,#e6ebf2);
    }

    #site-header #theme-icon{
      stroke:currentColor;
      color:var(--ink);
    }

    #site-header .give-btn{
      padding:9px 18px;
      border-radius:999px;
      background:var(--accent,#F17300);
      color:#fff;
      font-weight:700;
      text-decoration:none;
      transition:all .2s ease;
    }

    #site-header .give-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 10px 25px rgba(241,115,0,.35);
    }

    /* DARK MODE VARIABLES */
    html[data-theme="dark"]{
      --surface:#0f172a;
      --ink:#f1f5f9;
      --border:#1e293b;
    }
  </style>

  <!-- THEME SCRIPT -->
  <script>
    (function(){
      const html = document.documentElement;
      const toggle = document.getElementById('theme-toggle');
      const icon = document.getElementById('theme-icon');
      const logo = document.getElementById('site-logo');

      function renderIcon(theme){
        if(theme === 'dark'){
          icon.innerHTML = `
            <circle cx="12" cy="12" r="5"
                    stroke="currentColor"
                    stroke-width="2"
                    fill="none"/>
            <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="12" y1="1" x2="12" y2="4"/>
              <line x1="12" y1="20" x2="12" y2="23"/>
              <line x1="4.2" y1="4.2" x2="6.3" y2="6.3"/>
              <line x1="17.7" y1="17.7" x2="19.8" y2="19.8"/>
              <line x1="1" y1="12" x2="4" y2="12"/>
              <line x1="20" y1="12" x2="23" y2="12"/>
            </g>`;
        } else {
          icon.innerHTML = `
            <path d="M21 12.8A9 9 0 1111.2 3 7 7 0 0021 12.8z"
                  stroke="currentColor"
                  stroke-width="2"
                  fill="none"/>`;
        }
      }

      function applyTheme(theme){
        html.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        logo.src = theme === 'dark'
          ? '/israelite-research/images/white-logo-letters.png'
          : '/israelite-research/images/black-logo-letters.png';
        renderIcon(theme);
      }

      const saved = localStorage.getItem('theme') || 'light';
      applyTheme(saved);

      toggle.addEventListener('click', ()=>{
        const current = html.getAttribute('data-theme');
        applyTheme(current === 'dark' ? 'light' : 'dark');
      });
    })();
  </script>
