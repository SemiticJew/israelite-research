<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Chapter</title>
<link rel="stylesheet" href="/styles.css"/>

<style>
  .page-header{padding:24px 0 8px}
  .page-title{margin:0;font-size:2rem;font-weight:800}
  .crumbs{color:var(--muted);font-size:.9rem;margin-top:4px}

  .layout{display:grid;grid-template-columns:2fr 1fr;gap:18px;margin:16px 0 40px}
  .panel{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    padding:14px
  }
  .panel h3{margin:.2rem 0 0.6rem;font-size:1.05rem;color:var(--brand)}
  .muted{color:var(--muted)}
  @media (max-width:900px){.layout{grid-template-columns:1fr}}

  /* Verse rows */
  #verses{display:flex;flex-direction:column}
  .verse{display:flex;flex-direction:column;padding:12px 0}
  .verse + .verse{border-top:1px solid var(--border)}
  .vnum{font-weight:800;color:var(--brand)}
  .vnum::after{content:" —";color:var(--muted);margin-left:.25rem}
  .vtext{color:var(--ink);line-height:1.6}

  /* Verse tools */
  .v-tools{margin-top:6px;display:flex;gap:6px}
  .tool-btn{
    padding:.22rem .55rem;
    font-size:.8rem;
    border-radius:8px;
    border:1px solid var(--border);
    background:var(--surface);
    cursor:pointer
  }
  .tool-btn:hover{background:var(--surface-alt, rgba(0,0,0,.04))}

  /* Panels under each verse */
  .v-panel{
    display:none;
    margin-top:6px;
    padding:8px;
    border:1px solid var(--border);
    border-radius:8px;
    background:var(--surface-alt, rgba(0,0,0,.04))
  }
  .v-panel.open{display:block}
  .v-panel.xr{font-size:.88rem}
  .xr-line a{color:var(--brand);margin-right:4px}

  /* Dictionary */
  .dict-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:.5rem;
    margin-bottom:.4rem
  }
  .dict-title{font-weight:700;color:var(--ink)}
  .icon-btn{
    border:1px solid var(--border);
    background:var(--surface);
    border-radius:8px;
    padding:.35rem;
    cursor:pointer
  }
  .icon-btn:hover{background:var(--surface-alt, rgba(0,0,0,.04))}
  .dict-reveal{overflow:hidden;max-height:0;transition:max-height .2s ease}
  .dict-input{
    width:100%;
    border:1px solid var(--border);
    border-radius:10px;
    padding:.5rem .6rem;
    font:inherit;
    background:var(--surface);
    color:var(--ink)
  }
  .dict-body{margin-top:.5rem;font-size:.95rem;line-height:1.5}

  /* Toolbar */
  .reader-toolbar{
    position:sticky;
    top:0;
    z-index:50;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:.5rem;
    flex-wrap:wrap;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    padding:.5rem;
    margin:10px 0 16px;
    box-shadow:var(--shadow)
  }
  .reader-toolbar .btn,
  .reader-toolbar select{
    padding:.45rem .6rem;
    border:1px solid var(--border);
    background:var(--surface);
    border-radius:10px;
    font:inherit;
    cursor:pointer
  }
  .reader-toolbar .btn:hover{background:var(--surface-alt, rgba(0,0,0,.04))}

  /* Author modal visibility control */
  #author-modal.modal-overlay{
    display:none!important;
    opacity:0;
    visibility:hidden
  }
  #author-modal.modal-overlay.open{
    display:flex!important;
    opacity:1;
    visibility:visible
  }
</style>
</head>

<body>

<div id="site-header"></div>

<main class="container">
  <header class="page-header">
    <h1 class="page-title" id="pageTitle">Bible Reader</h1>
    <div class="crumbs" id="crumbs">Canon → Book → Chapter</div>
  </header>

  <div class="reader-toolbar" id="readerToolbar" role="navigation" aria-label="Chapter navigation">
    <button class="btn prev" id="btnPrev">← Prev</button>

    <select id="canonSelect">
      <option value="tanakh">Tanakh</option>
      <option value="newtestament">New Testament</option>
      <option value="apocrypha">Apocrypha</option>
    </select>

    <select id="bookSelect"></select>
    <select id="chSelect"></select>

    <button class="btn next" id="btnNext">Next →</button>
  </div>

  <section class="layout">
    <div class="panel">
      <h3>Text</h3>
      <div id="verses"><p class="muted">Loading…</p></div>
    </div>

    <aside class="panel">
      <div class="dict-head">
        <div class="dict-title">Bible Dictionary</div>
        <button class="icon-btn" id="dictToggle">
          🔍
        </button>
      </div>
      <div class="dict-reveal" id="dictReveal">
        <input class="dict-input" id="dictQuery" type="search" placeholder="Type a word, then press Enter">
      </div>
      <div class="dict-body" id="dictBody">
        <p class="muted">Open the search to look up a term.</p>
      </div>
    </aside>
  </section>
</main>

<div id="hovercard" class="hovercard" role="dialog" aria-hidden="true"></div>

<div id="site-footer"></div>

<script src="/js/shims.js" defer></script>
<script src="/js/canon-strongs.js" defer></script>
<script src="/js/nt-chapter.js" defer></script>
<script src="/js/xref-hover.js" defer></script>
<script src="/js/theme-toggle.js" defer></script>
<script src="/js/include.js" defer></script>

</body>
</html>
