<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Scripture Reader — Semitic Jew</title>
<link rel="stylesheet" href="/styles.css"/>

<style>
  .page-header{padding:24px 0 8px}
  .page-title{margin:0;font-size:2rem;font-weight:800}
  .crumbs{color:var(--muted);font-size:.9rem;margin-top:4px}

  .layout{display:grid;grid-template-columns:2fr 1fr;gap:18px;margin:16px 0 40px}
  .panel{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    padding:14px
  }
  .panel h3{margin:.2rem 0 0.6rem;font-size:1.05rem;color:var(--brand)}
  .muted{color:var(--muted)}
  @media (max-width:900px){.layout{grid-template-columns:1fr}}

  /* Verse rows */
  #verses{display:flex;flex-direction:column}
  .verse{display:flex;flex-direction:column;padding:12px 0}
  .verse + .verse{border-top:1px solid var(--border)}
  .vnum{font-weight:800;color:var(--brand)}
  .vnum::after{content:" —";color:var(--muted);margin-left:.25rem}
  .vtext{color:var(--ink);line-height:1.6}

  /* Verse tools */
  .v-tools{margin-top:6px;display:flex;gap:6px}
  .tool-btn{
    padding:.22rem .55rem;
    font-size:.8rem;
    border-radius:8px;
    border:1px solid var(--border);
    background:var(--surface);
    cursor:pointer
  }
  .tool-btn:hover{background:var(--surface-alt, rgba(0,0,0,.04))}

  /* Panels under each verse */
  .v-panel{
    display:none;
    margin-top:6px;
    padding:8px;
    border:1px solid var(--border);
    border-radius:8px;
    background:var(--surface-alt, rgba(0,0,0,.04))
  }
  .v-panel.open{display:block}
  .v-panel.xr{font-size:.88rem}
  .xr-line a{color:var(--brand);margin-right:4px}

  /* Dictionary */
  .dict-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:.5rem;
    margin-bottom:.4rem
  }
  .dict-title{font-weight:700;color:var(--ink)}
  .icon-btn{
    border:1px solid var(--border);
    background:var(--surface);
    border-radius:8px;
    padding:.35rem;
    cursor:pointer
  }
  .icon-btn:hover{background:var(--surface-alt, rgba(0,0,0,.04))}
  .dict-reveal{overflow:hidden;max-height:0;transition:max-height .2s ease}
  .dict-input{
    width:100%;
    border:1px solid var(--border);
    border-radius:10px;
    padding:.5rem .6rem;
    font:inherit;
    background:var(--surface);
    color:var(--ink)
  }
  .dict-body{margin-top:.5rem;font-size:.95rem;line-height:1.5}

  /* Toolbar */
  .reader-toolbar{
    position:sticky;
    top:0;
    z-index:50;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:.5rem;
    flex-wrap:wrap;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    padding:.5rem;
    margin:10px 0 16px;
    box-shadow:var(--shadow)
  }
  .reader-toolbar .btn,
  .reader-toolbar select{
    padding:.45rem .6rem;
    border:1px solid var(--border);
    background:var(--surface);
    border-radius:10px;
    font:inherit;
    cursor:pointer
  }
  .reader-toolbar .btn:hover{background:var(--surface-alt, rgba(0,0,0,.04))}

  /* Author modal visibility control */
  #author-modal.modal-overlay{
    display:none!important;
    opacity:0;
    visibility:hidden
  }
  #author-modal.modal-overlay.open{
    display:flex!important;
    opacity:1;
    visibility:visible
  }

  /* Breadcrumbs */
  .breadcrumbs{
    max-width:1200px;
    margin:18px auto 0;
    padding:0 16px;
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
    font-size:.9rem;
    color:var(--muted);
  }

  .breadcrumbs a{
    color:var(--muted);
    text-decoration:none;
    font-weight:700;
  }

  .breadcrumbs a:hover,
  .breadcrumbs a:focus,
  .breadcrumbs a:focus-visible{
    color:var(--accent);
    text-decoration:none;
  }

  .breadcrumbs .sep{
    color:var(--muted);
    opacity:.75;
  }

  .breadcrumbs .current{
    color:var(--ink);
    font-weight:800;
  }



/* Modern shared Bible reader shell */
body.reader-page{
  background:var(--surface);
  color:var(--ink);
}

body.reader-page main.container{
  max-width:1200px;
  margin:0 auto;
  padding:24px 24px 80px;
}

body.reader-page .page-header{
  margin:18px 0 20px;
  padding:46px 28px;
  text-align:center;
  border:1px solid var(--border);
  background:
    radial-gradient(circle at top left, rgba(241,115,0,.16), transparent 34%),
    linear-gradient(135deg, rgba(5,74,145,.10), rgba(129,164,205,.08));
}

body.reader-page .page-title{
  margin:0;
  color:var(--ink);
  font-size:clamp(2rem, 5vw, 4rem);
  line-height:1;
  font-weight:900;
  letter-spacing:-.05em;
}

body.reader-page .crumbs{
  margin-top:14px;
  color:var(--muted);
  font-size:1rem;
  font-weight:700;
}

body.reader-page .reader-toolbar{
  top:12px;
  z-index:80;
  justify-content:space-between;
  gap:10px;
  margin:0 0 20px;
  padding:14px;
  border:1px solid var(--border);
  border-radius:0;
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(14px);
  box-shadow:var(--shadow);
}

body.reader-page .reader-toolbar .btn,
body.reader-page .reader-toolbar select{
  min-height:42px;
  border-radius:0;
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--ink);
  font-weight:800;
}

body.reader-page .reader-toolbar .btn:hover,
body.reader-page .reader-toolbar select:hover{
  border-color:var(--accent);
}

body.reader-page .layout{
  grid-template-columns:minmax(0, 2fr) 360px;
  gap:22px;
  margin:18px 0 40px;
  align-items:start;
}

body.reader-page .panel{
  border:1px solid var(--border);
  border-radius:0;
  background:var(--surface);
  box-shadow:var(--shadow);
  padding:0;
  overflow:hidden;
}

body.reader-page .panel h3{
  margin:0;
  padding:16px 18px;
  color:var(--ink);
  font-size:.9rem;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.12em;
  border-bottom:1px solid var(--border);
  background:
    radial-gradient(circle at top left, rgba(241,115,0,.08), transparent 40%),
    var(--surface);
}

body.reader-page #verses{
  padding:6px 20px 20px;
}

body.reader-page .verse{
  padding:18px 0;
}

body.reader-page .verse + .verse{
  border-top:1px solid var(--border);
}

body.reader-page .vnum{
  display:inline-flex;
  align-self:flex-start;
  margin-bottom:7px;
  color:var(--accent);
  font-size:.82rem;
  font-weight:900;
  letter-spacing:.04em;
}

body.reader-page .vnum::after{
  content:"";
}

body.reader-page .vtext{
  color:var(--ink);
  font-size:1.08rem;
  line-height:1.82;
}

body.reader-page .v-tools{
  margin-top:10px;
}

body.reader-page .tool-btn,
body.reader-page .icon-btn{
  border-radius:999px;
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--ink);
  font-weight:800;
}

body.reader-page .tool-btn:hover,
body.reader-page .icon-btn:hover{
  border-color:var(--accent);
  color:var(--accent);
  background:var(--surface);
}

body.reader-page .v-panel{
  border-radius:0;
  border:1px solid var(--border);
  background:rgba(5,74,145,.035);
  color:var(--ink);
}

body.reader-page aside.panel{
  position:sticky;
  top:94px;
}

body.reader-page .dict-head{
  margin:0;
  padding:16px 18px;
  border-bottom:1px solid var(--border);
  background:
    radial-gradient(circle at top left, rgba(241,115,0,.08), transparent 40%),
    var(--surface);
}

body.reader-page .dict-title{
  color:var(--ink);
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.1em;
  font-size:.9rem;
}

body.reader-page .dict-reveal{
  padding:0 18px;
}

body.reader-page .dict-input{
  margin-top:14px;
  border-radius:0;
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--ink);
}

body.reader-page .dict-body{
  padding:16px 18px 20px;
  margin:0;
  color:var(--muted);
}

html[data-theme="dark"] body.reader-page .page-header{
  background:
    radial-gradient(circle at top left, rgba(241,115,0,.22), transparent 34%),
    linear-gradient(135deg, rgba(5,74,145,.24), rgba(15,23,42,.92));
}

html[data-theme="dark"] body.reader-page .reader-toolbar{
  background:rgba(15,23,42,.88);
}

html[data-theme="dark"] body.reader-page .page-title,
html[data-theme="dark"] body.reader-page .panel h3,
html[data-theme="dark"] body.reader-page .dict-title,
html[data-theme="dark"] body.reader-page .vtext{
  color:#ffffff !important;
}

html[data-theme="dark"] body.reader-page .panel,
html[data-theme="dark"] body.reader-page .reader-toolbar,
html[data-theme="dark"] body.reader-page .reader-toolbar .btn,
html[data-theme="dark"] body.reader-page .reader-toolbar select,
html[data-theme="dark"] body.reader-page .dict-head,
html[data-theme="dark"] body.reader-page .panel h3,
html[data-theme="dark"] body.reader-page .dict-input{
  background:var(--surface) !important;
  border-color:var(--border) !important;
}

@media(max-width:900px){
  body.reader-page .layout{
    grid-template-columns:1fr;
  }

  body.reader-page aside.panel{
    position:relative;
    top:auto;
  }
}

@media(max-width:700px){
  body.reader-page main.container{
    padding:18px 20px 64px;
    overflow-x:hidden;
  }

  body.reader-page .page-header{
    padding:38px 20px;
  }

  body.reader-page .reader-toolbar{
    position:relative;
    top:auto;
    align-items:stretch;
  }

  body.reader-page .reader-toolbar .btn,
  body.reader-page .reader-toolbar select{
    flex:1 1 100%;
    width:100%;
  }

  body.reader-page #verses{
    padding:4px 16px 18px;
  }
}

</style>
</head>

<body class="reader-page">

<div id="site-header"></div>

<nav class="breadcrumbs" aria-label="Breadcrumb" id="readerBreadcrumbs">
  <a href="/index.html">Home</a>
  <span class="sep">›</span>
  <a href="/biblia.html">Biblia</a>
  <span class="sep">›</span>
  <span class="current">Loading…</span>
</nav>

<main class="container">
  <header class="page-header">
    <h1 class="page-title" id="pageTitle">Bible Reader</h1>
    <div class="crumbs" id="crumbs">Canon → Book → Chapter</div>
  </header>

  <div class="reader-toolbar" id="readerToolbar" role="navigation" aria-label="Chapter navigation">
    <button class="btn prev" id="btnPrev">← Prev</button>

    <select id="canonSelect">
      <option value="tanakh">Tanakh</option>
      <option value="newtestament">New Testament</option>
      <option value="apocrypha">Apocrypha</option>
    </select>

    <select id="bookSelect"></select>
    <select id="chSelect"></select>

    <button class="btn next" id="btnNext">Next →</button>
  </div>

  <section class="layout">
    <div class="panel">
      <h3>Text</h3>
      <div id="verses"><p class="muted">Loading…</p></div>
    </div>

    <aside class="panel">
      <div class="dict-head">
        <div class="dict-title">Bible Dictionary</div>
        <button class="icon-btn" id="dictToggle">
          🔍
        </button>
      </div>
      <div class="dict-reveal" id="dictReveal">
        <input class="dict-input" id="dictQuery" type="search" placeholder="Type a word, then press Enter">
      </div>
      <div class="dict-body" id="dictBody">
        <p class="muted">Open the search to look up a term.</p>
      </div>
    </aside>
  </section>
</main>

<div id="site-footer"></div>
<div id="hovercard" class="hovercard" role="dialog" aria-hidden="true"></div>

<script src="/js/shims.js" defer></script>
<script src="/js/canon-strongs.js" defer></script>
<script src="/js/nt-chapter.js" defer></script>
<script src="/js/xref-hover.js" defer></script>
<script src="/js/theme-toggle.js" defer></script>
<script src="/js/include.js" defer></script>
</body>
</html>
