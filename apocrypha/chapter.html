<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Scripture Reader — Semitic Jew</title>
<link rel="stylesheet" href="/styles.css"/>

<style>
  .page-header{padding:24px 0 8px}
  .page-title{margin:0;font-size:2rem;font-weight:800}
  .crumbs{color:var(--muted);font-size:.9rem;margin-top:4px}

  .layout{display:grid;grid-template-columns:2fr 1fr;gap:18px;margin:16px 0 40px}
  .panel{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    padding:14px
  }
  .panel h3{margin:.2rem 0 0.6rem;font-size:1.05rem;color:var(--brand)}
  .muted{color:var(--muted)}
  @media (max-width:900px){.layout{grid-template-columns:1fr}}

  /* Verse rows */
  #verses{display:flex;flex-direction:column}
  .verse{display:flex;flex-direction:column;padding:12px 0}
  .verse + .verse{border-top:1px solid var(--border)}
  .vnum{font-weight:800;color:var(--brand)}
  .vnum::after{content:" —";color:var(--muted);margin-left:.25rem}
  .vtext{color:var(--ink);line-height:1.6}

  /* Verse tools */
  .v-tools{margin-top:6px;display:flex;gap:6px}
  .tool-btn{
    padding:.22rem .55rem;
    font-size:.8rem;
    border-radius:8px;
    border:1px solid var(--border);
    background:var(--surface);
    cursor:pointer
  }
  .tool-btn:hover{background:var(--surface-alt, rgba(0,0,0,.04))}

  /* Panels under each verse */
  .v-panel{
    display:none;
    margin-top:6px;
    padding:8px;
    border:1px solid var(--border);
    border-radius:8px;
    background:var(--surface-alt, rgba(0,0,0,.04))
  }
  .v-panel.open{display:block}
  .v-panel.xr{font-size:.88rem}
  .xr-line a{color:var(--brand);margin-right:4px}

  /* Dictionary */
  .dict-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:.5rem;
    margin-bottom:.4rem
  }
  .dict-title{font-weight:700;color:var(--ink)}
  .icon-btn{
    border:1px solid var(--border);
    background:var(--surface);
    border-radius:8px;
    padding:.35rem;
    cursor:pointer
  }
  .icon-btn:hover{background:var(--surface-alt, rgba(0,0,0,.04))}
  .dict-reveal{overflow:hidden;max-height:0;transition:max-height .2s ease}
  .dict-input{
    width:100%;
    border:1px solid var(--border);
    border-radius:10px;
    padding:.5rem .6rem;
    font:inherit;
    background:var(--surface);
    color:var(--ink)
  }
  .dict-body{margin-top:.5rem;font-size:.95rem;line-height:1.5}

  /* Toolbar */
  .reader-toolbar{
    position:sticky;
    top:0;
    z-index:50;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:.5rem;
    flex-wrap:wrap;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:10px;
    padding:.5rem;
    margin:10px 0 16px;
    box-shadow:var(--shadow)
  }
  .reader-toolbar .btn,
  .reader-toolbar select{
    padding:.45rem .6rem;
    border:1px solid var(--border);
    background:var(--surface);
    border-radius:10px;
    font:inherit;
    cursor:pointer
  }
  .reader-toolbar .btn:hover{background:var(--surface-alt, rgba(0,0,0,.04))}

  /* Author modal visibility control */
  #author-modal.modal-overlay{
    display:none!important;
    opacity:0;
    visibility:hidden
  }
  #author-modal.modal-overlay.open{
    display:flex!important;
    opacity:1;
    visibility:visible
  }

  /* Breadcrumbs */
  .breadcrumbs{
    max-width:1200px;
    margin:18px auto 0;
    padding:0 16px;
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
    font-size:.9rem;
    color:var(--muted);
  }

  .breadcrumbs a{
    color:var(--muted);
    text-decoration:none;
    font-weight:700;
  }

  .breadcrumbs a:hover,
  .breadcrumbs a:focus,
  .breadcrumbs a:focus-visible{
    color:var(--accent);
    text-decoration:none;
  }

  .breadcrumbs .sep{
    color:var(--muted);
    opacity:.75;
  }

  .breadcrumbs .current{
    color:var(--ink);
    font-weight:800;
  }



/* Modern shared Bible reader shell */
body.reader-page{
  background:var(--surface);
  color:var(--ink);
}

body.reader-page main.container{
  max-width:1200px;

  padding:24px 24px 80px;
}

  margin:10px 0 0 18px;
  color:var(--ink);
  line-height:1.55;
}

html[data-theme="dark"] body.reader-page .dict-body .muted,
html[data-theme="dark"] body.reader-page .lex-field{
  background:rgba(255,255,255,.035);
  border-color:var(--border);
}

html[data-theme="dark"] body.reader-page .v-panel.st .strongs-item,
html[data-theme="dark"] body.reader-page .lex-card{
  background:var(--surface);
  border-color:var(--border);
}

html[data-theme="dark"] body.reader-page .v-panel.st .strongs-item .lemma,
html[data-theme="dark"] body.reader-page .lex-lemma,
html[data-theme="dark"] body.reader-page .v-panel.st .strongs-item .gloss,
html[data-theme="dark"] body.reader-page .lex-gloss,
html[data-theme="dark"] body.reader-page .lex-value,
html[data-theme="dark"] body.reader-page .v-panel.st .defs{
  color:#ffffff !important;
}



/* Exposition refinement: clearer personal study notes */
body.reader-page .v-panel.cm{
  padding:14px;
  border:1px solid var(--border);
  background:
    radial-gradient(circle at top left, rgba(241,115,0,.06), transparent 40%),
    rgba(5,74,145,.035);
}

body.reader-page .v-panel.cm::before{
  content:"Personal Exposition";
  display:block;
  margin:0 0 6px;
  color:var(--accent);
  font-size:.72rem;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.12em;
}

body.reader-page .v-panel.cm::after{
  content:"Write your own verse notes, observations, or study thoughts. Notes are saved locally on this device.";
  display:block;
  margin-top:8px;
  color:var(--muted);
  font-size:.82rem;
  font-weight:700;
  line-height:1.45;
}

body.reader-page .exposition-text{
  width:100%;
  min-height:130px;
  resize:vertical;
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--ink);
  padding:13px 14px;
  font:inherit;
  font-size:.96rem;
  line-height:1.65;
  box-shadow:var(--shadow);
}

body.reader-page .exposition-text:focus{
  border-color:var(--accent);
  outline:none;
  box-shadow:0 0 0 3px rgba(241,115,0,.14);
}

body.reader-page .exposition-text::placeholder{
  color:var(--muted);
  opacity:.85;
}

html[data-theme="dark"] body.reader-page .v-panel.cm{
  background:rgba(255,255,255,.035);
  border-color:var(--border);
}

html[data-theme="dark"] body.reader-page .exposition-text{
  background:var(--surface);
  color:#ffffff;
  border-color:var(--border);
}

</style>
</head>

</nav>

<main class="container">
  <header class="page-header">
    <h1 class="page-title" id="pageTitle">Bible Reader</h1>
    <div class="crumbs" id="crumbs">Canon → Book → Chapter</div>
  </header>

  <div class="reader-toolbar" id="readerToolbar" role="navigation" aria-label="Chapter navigation">
    <button class="btn prev" id="btnPrev">← Prev</button>

    <select id="canonSelect">
      <option value="tanakh">Tanakh</option>
      <option value="newtestament">New Testament</option>
      <option value="apocrypha">Apocrypha</option>

      <h3>Text</h3>

      <div class="dict-head">
        <div class="dict-title">Word Study / Lexicon</div>
        <button class="icon-btn" id="dictToggle">
          🔍
        </button>
      </div>
      <div class="dict-reveal" id="dictReveal">
        <input class="dict-input" id="dictQuery" type="search" placeholder="Search a word or Strong’s number">
      </div>
      <div class="dict-body" id="dictBody"><p class="muted">No word selected yet. Search a word or open a verse lexicon entry.</p></div>
    </aside>
  </section>
</main>

<div id="site-footer"></div>
<div id="hovercard" class="hovercard" role="dialog" aria-hidden="true"></div>

<script>
(function(){
  const params = new URLSearchParams(window.location.search);
  const raw = (params.get("book") || "").trim().toLowerCase();

  const aliases = {
    "ps": "psalm",
    "psa": "psalm",
    "psal": "psalm",
    "psalm": "psalm",
    "psalms": "psalm",
    "book-of-psalms": "psalm",
    "the-psalms": "psalm"
  };

  if (aliases[raw] && raw !== aliases[raw]) {
    params.set("book", aliases[raw]);
    const next = window.location.pathname + "?" + params.toString() + window.location.hash;
    window.history.replaceState(null, "", next);
  }
})();
</script>
