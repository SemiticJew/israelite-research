<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>2 Esdras — Chapters</title>
<link rel="stylesheet" href="/styles.css"/>
<style>
  .page-header{padding:24px 0 8px}
  .page-title{margin:0;font-size:2rem;font-weight:800}
  .crumbs{color:#6b7280;font-size:.9rem;margin-top:4px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(64px,1fr));gap:12px;margin:18px 0 36px}
  .ch{display:flex;align-items:center;justify-content:center;padding:14px;border:1px solid var(--sky);border-radius:12px;background:var(--surface);text-decoration:none;color:var(--ink);font-weight:700}
  .ch:hover{background:#fbfdff;box-shadow:0 4px 16px rgba(0,0,0,.06)}

  /* Breadcrumbs */
  .breadcrumbs{
    max-width:1200px;
    margin:18px auto 0;
    padding:0 16px;
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
    font-size:.9rem;
    color:var(--muted);
  }

  .breadcrumbs a{
    color:var(--muted);
    text-decoration:none;
    font-weight:700;
  }

  .breadcrumbs a:hover,
  .breadcrumbs a:focus,
  .breadcrumbs a:focus-visible{
    color:var(--accent);
    text-decoration:none;
  }

  .breadcrumbs .sep{
    color:var(--muted);
    opacity:.75;
  }

  .breadcrumbs .current{
    color:var(--ink);
    font-weight:800;
  }

</style>
</head>
<body>
<div id="site-header"></div>
<nav class="breadcrumbs" aria-label="Breadcrumb">
  <a href="/index.html">Home</a>
  <span class="sep">›</span>
  <a href="/biblia.html">Biblia</a>
  <span class="sep">›</span>
  <a href="/apocrypha.html">Apocrypha</a>
  <span class="sep">›</span>
  <span class="current">2 Esdras</span>
</nav>

<main class="container">
  <header class="page-header">
    <h1 class="page-title">2 Esdras</h1>
    <div class="crumbs">Chapters</div>
  </header>
  <section class="panel">
    <div id="chapGrid" class="grid"></div>
  </section>
</main>
<script src="/js/wire-chapter-cards.js" defer></script>
<div id="site-footer"></div>
<script src="/js/include.js"></script>
</body>
</html>
