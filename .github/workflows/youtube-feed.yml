name: Update YouTube feed

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update-youtube-feed:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: python scripts/fetch_youtube_feed.py

      - name: Commit updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/youtube-videos.json
          if git diff --cached --quiet; then
            echo "No YouTube feed changes."
          else
            git commit -m "Update YouTube video feed"
            git push
          fi
